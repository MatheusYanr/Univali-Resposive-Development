<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora — Atividade 10/04</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>
  <div class="fundo"></div>

  <div class="calc-wrap">
    <p class="calc-titulo">Calculadora</p>
    <div class="calc" role="application" aria-label="Calculadora simples">
      <div class="tela" id="tela" aria-live="polite">0</div>
      <div class="teclas">
        <button type="button" class="btn btn-fn" data-ac="clear">C</button>
        <button type="button" class="btn btn-fn" data-ac="back">⌫</button>
        <button type="button" class="btn btn-fn" data-ac="percent">%</button>
        <button type="button" class="btn btn-op" data-op="/">÷</button>

        <button type="button" class="btn" data-num="7">7</button>
        <button type="button" class="btn" data-num="8">8</button>
        <button type="button" class="btn" data-num="9">9</button>
        <button type="button" class="btn btn-op" data-op="*">×</button>

        <button type="button" class="btn" data-num="4">4</button>
        <button type="button" class="btn" data-num="5">5</button>
        <button type="button" class="btn" data-num="6">6</button>
        <button type="button" class="btn btn-op" data-op="-">−</button>

        <button type="button" class="btn" data-num="1">1</button>
        <button type="button" class="btn" data-num="2">2</button>
        <button type="button" class="btn" data-num="3">3</button>
        <button type="button" class="btn btn-op" data-op="+">+</button>

        <button type="button" class="btn btn-zero" data-num="0">0</button>
        <button type="button" class="btn" data-num=".">,</button>
        <button type="button" class="btn btn-igual" data-ac="eq">=</button>
      </div>
    </div>
    <p class="calc-volta"><a href="../index.html">← Atividades</a></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
